<section class="container recent-content">
  <div class="sections-container">
    <div class="item-list">
      <h2>Posts</h2>
      <div class="grid-container">
        {{ range first 5 (where .Site.RegularPages "Section" "posts") }}
        <div class="grid-row">
          <div class="icon-column">
            <i class="fas fa-pen-nib"></i>
          </div>
          <div class="title-column">
            <a href="{{ .RelPermalink }}">{{ .Title }}</a>
          </div>
          <div class="date-column">
            <span class="post-date" title="{{ .Date.Format "2006-01-02 @ 15:04" }}">
              {{ .Date.Format "2006-01-02" }}
            </span>
          </div>
        </div>
        {{ end }}
      </div>
      <a href="/posts" class="view-all">View all posts</a>
    </div>

    <div class="item-list">
      <h2>Events</h2>
      <div class="grid-container">
        {{ range first 5 (where .Site.RegularPages "Section" "events") }}
        <div class="grid-row">
          <div class="icon-column">
            <i class="fas fa-microphone"></i>
          </div>
          <div class="title-column">
            <a href="{{ .RelPermalink }}">{{ .Title }}</a>
          </div>
          <div class="date-column">
            <span class="event-date" title="{{ .Date.Format "2006-01-02 @ 15:04" }}">
              {{ .Date.Format "2006-01-02" }}
            </span>
          </div>
        </div>
        {{ end }}
      </div>
      <a href="/events" class="view-all">View all events</a>
    </div>
  </div>
</section>

<style>
  .sections-container {
    display: flex;
    gap: 2rem;
    flex-wrap: wrap;
    width: 100%;
  }

  .item-list {
    flex: 1 1 0;
    min-width: 300px;
    width: 0;
  }

  .item-list h2 {
    border-bottom: 2px solid #ddd;
    padding-bottom: 0.5rem;
    margin-bottom: 1rem;
    width: 100%;
  }

  .grid-container {
    display: grid;
    gap: 0.5rem;
    width: 100%;
  }

  .grid-row {
    display: grid;
    grid-template-columns: auto 1fr auto;
    align-items: center;
    gap: 1rem;
    width: 100%;
  }

  .icon-column {
    width: 1.5em;
    text-align: center;
  }

  .title-column {
    text-align: left;
    min-width: 0;
  }

  .date-column {
    text-align: right;
  }

  .post-date, .event-date {
    font-size: 0.9em;
    color: #666;
    white-space: nowrap;
  }

  .view-all {
    display: block;
    margin-top: 1em;
  }

  @media (max-width: 768px) {
    .sections-container {
      flex-direction: column;
    }

    .item-list {
      width: 100%;
    }
  }
</style>
